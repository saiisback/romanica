services:
  postgres:
    image: postgres:16-alpine
    container_name: romanica-postgres
    environment:
      POSTGRES_USER: romanica
      POSTGRES_PASSWORD: romanica
      POSTGRES_DB: romanica
    ports:
      # host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432)
      - "5433:5432"
    volumes:
      - romanica-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U romanica"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object store for large input/output blobs
  minio:
    image: minio/minio:latest
    container_name: romanica-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: romanica
      MINIO_ROOT_PASSWORD: romanica123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - romanica-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # one-shot: create the bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 romanica romanica123 &&
      mc mb --ignore-existing local/romanica-traces &&
      echo 'bucket ready';
      "

volumes:
  romanica-pgdata:
  romanica-miniodata:
